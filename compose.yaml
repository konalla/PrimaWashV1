services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-prima_wash}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prima_wash}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prima_wash}
    working_dir: /app/apps/api
    command: ["node", "dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 3001
      PERSISTENCE_MODE: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prima_wash}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-prima-wash-local-compose-secret-change-me}
      ALLOW_DEV_HEADER_AUTH: "true"
      SHOW_DEV_AUTH_CODE: "true"
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      WEB_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
